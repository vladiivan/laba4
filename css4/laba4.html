<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastfood — Foo Landing Page</title>
    <link rel="stylesheet" href="css4.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page">
        <!-- ШАПКА -->
        <div class="header">
            <div class="header__logo">
                <div class="header__logo-icon"></div>
                <div class="header__logo-text">Foo</div>
            </div>

            <div class="nav">
                <button class="nav__item">Home</button>
                <button class="nav__item">Menu</button>
                <button class="nav__item">Contact</button>
                <button class="nav__item">Shop</button>
            </div>

            <div class="actions">
                <button class="actions__search">
                    <span class="actions__search-icon"></span>
                    <span class="actions__search-text">Q Search</span>
                </button>
                <div class="divider"></div>
                <div class="cart">
                    <button class="cart__icon" aria-label="Shopping cart"></button>
                    <div class="cart__badge">2</div>
                </div>
            </div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="content">
            <div class="content__left">
                <div class="title">
                    <div class="title__fast">Fast</div>
                    <div class="title__right">
                        <div class="title__food">Food</div>
                        <div class="title__delivery">Delivery</div>
                    </div>
                </div>

                <div class="description">
                    Sed ut perspiciatis unde omnis iste natus sit<br>
                    voluptatem accusantium doloremque laudantium
                </div>

                <div class="buttons">
                    <button class="buttons__order">Order Now</button>
                    <div class="buttons__video">
                        <div class="buttons__video-circle"></div>
                        <button class="buttons__video-text">Watch Video</button>
                    </div>
                </div>

                <div class="rating">
                    <div class="rating__stars">
                        <span class="rating__star">★</span>
                        <span class="rating__star">★</span>
                        <span class="rating__star">★</span>
                        <span class="rating__star">★</span>
                        <span class="rating__star">★</span>
                    </div>
                    <div class="rating__info">
                        <span class="rating__score">5 star rating</span>
                        <span class="rating__count">based on 1788 reviews</span>
                    </div>
                </div>
            </div>

            <div class="content__right">
                <div class="image"></div>
            </div>
        </div>
    </div>
</body>
</html>
